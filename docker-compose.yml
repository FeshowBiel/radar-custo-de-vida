services:
  postgres:
    image: postgres:16
    container_name: radar-postgres
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: radar
    ports:
      - "5433:5432"
    volumes:
      - radar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  radar_pgdata:

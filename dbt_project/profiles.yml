radar:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'radar') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'radar') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'radar') }}"
      schema: dbt
      threads: 4
      sslmode: "{{ env_var('PGSSLMODE', 'prefer') }}"

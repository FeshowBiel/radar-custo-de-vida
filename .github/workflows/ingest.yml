name: Ingest Series

on:
  schedule:
    - cron: '0 9 12 * *'   # dia 12 de cada mês, 09:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements-pipeline.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m ingestion.jobs.ingest_bcb_series
          python -m ingestion.jobs.ingest_ibge_regional
